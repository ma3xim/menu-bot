services:
  postgres:
    image: postgres:16-alpine
    container_name: foodmate-postgres
    environment:
      POSTGRES_DB: menu_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host 5433 → container 5432, чтобы не пересекаться с локальным Postgres на 5432
      - "5433:5432"
    volumes:
      - foodmate_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d menu_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: foodmate-bot
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/menu_bot
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      TZ: Asia/Novosibirsk
      BOT_TZ: Asia/Novosibirsk
    restart: unless-stopped

volumes:
  foodmate_pg_data:
