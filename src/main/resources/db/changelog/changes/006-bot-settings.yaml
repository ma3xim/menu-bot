databaseChangeLog:
  - changeSet:
      id: 006-bot-settings
      author: foodmate
      changes:
        - createTable:
            tableName: bot_settings
            columns:
              - column:
                  name: setting_key
                  type: VARCHAR(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: setting_value
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
