spring:
  application:
    name: foodmate-bot
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/menu_bot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

bot:
  token: ${BOT_TOKEN:CHANGE_ME}
  whitelist-ids: ${BOT_WHITELIST_IDS:}
  recent-days: ${BOT_RECENT_DAYS:3}
  reminder:
    enabled: ${BOT_REMINDER_ENABLED:true}
    cron: ${BOT_REMINDER_CRON:0 0 10 * * *}
    timezone: ${BOT_REMINDER_TZ:Asia/Vladivostok}

logging:
  level:
    root: INFO
    com.foodmate.bot: DEBUG
